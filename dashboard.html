<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<h1>Dashboard</h1>

<button id="addProjectBtn" onclick="addProject()">+ Add Project</button>

<div id="projectList"></div>

<script>
const user = JSON.parse(localStorage.getItem("user"));

if (!user) {
  window.location.href = "index.html";
}

// Load projects
let projects = JSON.parse(localStorage.getItem("projects")) || [];

// 🔗 Open project
function openProject(index) {
  localStorage.setItem("currentProjectIndex", index);
  window.location.href = "project.html";
}

// Render projects
function renderProjects() {
  const container = document.getElementById("projectList");
  container.innerHTML = "";

  projects.forEach((project, index) => {

    // USER can only see assigned projects
    if (user.role === "user" && project.assignedTo !== user.email) {
      return;
    }

    const div = document.createElement("div");
    div.className = "project-card";

    div.innerHTML = `
      <strong>${project.name}</strong>
      <p>Assigned to: ${project.assignedTo}</p>
      ${user.role === "admin" ? `<button onclick="deleteProject(${index}); event.stopPropagation();">Delete</button>` : ""}
    `;

    // 🔥 Click card to open project
    div.onclick = () => openProject(index);

    container.appendChild(div);
  });
}

// Admin-only: Add project
function addProject() {
  if (user.role !== "admin") {
    alert("Only admin can create projects");
    return;
  }

  const name = prompt("Enter project name:");
  const assignedTo = prompt("Assign to (user email):");

  if (!name || !assignedTo) return;

  projects.push({
    name: name,
    assignedTo: assignedTo
  });

  localStorage.setItem("projects", JSON.stringify(projects));
  renderProjects();
}

// Admin-only: Delete
function deleteProject(index) {
  if (!confirm("Are you sure you want to delete this project?")) return;

  projects.splice(index, 1);
  localStorage.setItem("projects", JSON.stringify(projects));
  renderProjects();
}

// Hide button for users
window.onload = function () {
  if (user.role !== "admin") {
    document.getElementById("addProjectBtn").style.display = "none";
  }
  renderProjects();
};
</script>

</body>
</html>
