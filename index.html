<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login | SEO Workspace</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">

  <div class="left-panel">
    <h1>SEO Project Workspace</h1>
    <p>Manage projects, links, and performance in one place.</p>
  </div>

  <div class="right-panel">
    <form id="loginForm">
      <h2>Sign In</h2>

      <input type="email" id="email" placeholder="Email" required>
      <input type="password" id="password" placeholder="Password" required>

      <button type="submit">Login</button>
      <p>Authorised users only</p>
    </form>
  </div>

</div>

<script type="module">
  import { seedUsers } from "./js/users.js";
  seedUsers();
</script>

<script type="module" src="js/auth.js"></script>
</body>
</html>
