<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Project Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>

<div class="app-layout">

  <!-- Sidebar -->
  <div class="sidebar">
    <h2>SM Projects DB</h2>
    <p class="role-text">ADMIN</p>

    <ul class="menu">
      <li class="active">Projects</li>
      <li>Users</li>
      <li>Activity Logs</li>
    </ul>

    <div class="sidebar-footer">
      <p>Logged in as</p>
      <strong id="userEmail"></strong>
      <button onclick="logout()">Logout</button>
    </div>
  </div>

  <!-- Main Content -->
  <div class="main-content">

    <div class="main-container">

      <div class="dashboard-header">
        <div>
          <h1>All Projects</h1>
          <p id="projectCount"></p>
        </div>

        <div class="header-actions">
          <input type="text" id="searchInput" placeholder="Search projects..." oninput="searchProjects()">
          <button id="addProjectBtn">+ Create Project</button>
        </div>
      </div>

      <div id="projectList" class="project-grid"></div>

    </div>

  </div>

</div>
<script>
const user = JSON.parse(localStorage.getItem("user"));

if (!user) {
  window.location.href = "index.html";
}

// Load projects
let projects = JSON.parse(localStorage.getItem("projects")) || [];

// 🔗 Open project
function openProject(index) {
  localStorage.setItem("currentProjectIndex", index);
  window.location.href = "project.html";
}

// Render projects
function renderProjects(filteredProjects = projects) {
  const container = document.getElementById("projectList");
  container.innerHTML = "";

  let visibleCount = 0;

  filteredProjects.forEach((project) => {
    const realIndex = projects.indexOf(project);

    // Role filtering
    if (user.role === "user" && project.assignedTo !== user.email) {
      return;
    }

    visibleCount++;

    const div = document.createElement("div");
    div.className = "project-card";

    const assignedUser = JSON.parse(localStorage.getItem("users"))?.find(u => u.email === project.assignedTo);
    const assignedName = assignedUser ? assignedUser.name : project.assignedTo;

    div.innerHTML = `
      <div class="card-header">
        <span class="folder-icon">📁</span>
        <div class="card-actions">
          ${user.role === "admin" ? `<button onclick="deleteProject(${realIndex}); event.stopPropagation();">🗑️</button>` : ""}
        </div>
      </div>

      <h3>${project.name}</h3>
      <p>No description</p>
      <small>Assigned to: ${assignedName}</small>
    `;

    div.onclick = () => openProject(realIndex);

    container.appendChild(div);
  });

  // ✅ Correct project count (after filtering)
  document.getElementById("projectCount").innerText =
    `${visibleCount} total projects`;
}

// Admin-only: Delete
function deleteProject(index) {
  if (!confirm("Are you sure you want to delete this project?")) return;

  projects.splice(index, 1);
  localStorage.setItem("projects", JSON.stringify(projects));
  renderProjects();
}

// 🔍 Search Projects (role-aware)
function searchProjects() {
  const searchValue = document.getElementById("searchInput").value.toLowerCase();

  const filtered = projects.filter(project => {
    const matchesSearch = project.name.toLowerCase().includes(searchValue);

    if (user.role === "user" && project.assignedTo !== user.email) {
      return false;
    }

    return matchesSearch;
  });

  renderProjects(filtered);
}

// Initial load
window.onload = function () {
  // Hide button for non-admin
  if (user.role !== "admin") {
    document.getElementById("addProjectBtn").style.display = "none";
  }

  // Set logged-in user email
  document.getElementById("userEmail").innerText = user.email;

  renderProjects();
};

// Logout
function logout() {
  localStorage.removeItem("user");
  window.location.href = "index.html";
}
</script>

<script type="module" src="js/project.js"></script>

</body>
</html>
